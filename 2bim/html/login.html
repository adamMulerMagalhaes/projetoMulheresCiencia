<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/2bim/css/login.css">

    <a href="/2bim/html/index.html"><button class="login">menu</button></a>
</head>
<body>
    <div class="form-container">
        <h1>SISTEMA COMPROMETIDO</h1>
        
        <div class="zombie-warning">
            "NÓS ADULTERAMU O FORMULÁRIU. NÃO VAI TER PLANTA HOJE. ASSINADO: OS ZUMBIS"
        </div>

        <form onsubmit="return false;">
            <div class="form-group">
                <label>Nome do Defensor:</label>
                <input type="text" value="Bloqueado por Forças Mortas" disabled>
            </div>

            <div class="form-group">
                <label>Escolha sua Planta Inicial:</label>
                <select disabled>
                    <option>Sementes Roubadas...</option>
                </select>
            </div>

            <div class="btn-wrapper">
                <button type="button" id="btn-enviar">Plantar Defesa!</button>
            </div>
        </form>
    </div>

    <script>
        const botao = document.getElementById('btn-enviar');
        let lado = false;

        // Função que faz o botão mudar de posição alternadamente quando o mouse chega perto
        botao.addEventListener('mouseenter', () => {
            if (!lado) {
                botao.style.left = '50%';
                botao.style.width = '50%';
                botao.innerHTML = 'ERROU!';
            } else {
                botao.style.left = '0';
                botao.style.width = '100%';
                botao.innerHTML = 'NÃO VAI ENVIAR!';
            }
            lado = !lado;
        });
    </script>
</body>
</html>
